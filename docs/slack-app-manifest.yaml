# Slack app manifest for Thread Assistant.
# Create the app: https://api.slack.com/apps → "From an app manifest" → paste this.
# After creating: Install to workspace, copy the Bot User OAuth Token (xoxb-…) into
# the SLACK_BOT_TOKEN secret and the Signing Secret into SLACK_SIGNING_SECRET.
display_information:
  name: Thread Assistant
  description: Suggest-only work bot — nudges and working-notes for GitHub/Slack threads.
  background_color: "#1f2d3d"
features:
  bot_user:
    display_name: thread-assistant
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write # post DMs (nudges, digests, confirmations)
      - im:write # open a DM channel with a user
      - im:history # receive the user's DM messages (preference commands)
      - users:read # users.list fallback for Slack-id resolution
      - users:read.email # users.lookupByEmail (preferred resolution)
settings:
  event_subscriptions:
    request_url: https://aipm.notdian.workers.dev/webhooks/slack
    bot_events:
      - message.im # a human DMs the bot → preference capture (DESIGN §8)
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
