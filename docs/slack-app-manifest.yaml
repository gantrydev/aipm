# Slack app manifest for aipm.
# Create the app: https://api.slack.com/apps → "From an app manifest" → paste this.
# After creating: Install to workspace, copy the Bot User OAuth Token (xoxb-…) into
# the SLACK_BOT_TOKEN secret and the Signing Secret into SLACK_SIGNING_SECRET.
display_information:
  name: aipm
  description: Suggest-only work bot — nudges and working-notes for GitHub/Slack threads.
  background_color: "#1f2d3d"
features:
  bot_user:
    display_name: aipm
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write # post DMs (nudges, digests, confirmations) + thread notes
      - im:write # open a DM channel with a user
      - im:history # receive the user's DM messages (preference commands)
      - channels:history # read channel thread replies (Slack threads as Threads)
      - groups:history # same, for private channels
      - reactions:write # react on messages (approval flow)
      - users:read # users.list fallback for Slack-id resolution
      - users:read.email # users.lookupByEmail (preferred resolution)
settings:
  event_subscriptions:
    request_url: https://aipm.<your-subdomain>.workers.dev/webhooks/slack
    bot_events:
      - message.im # a human DMs the bot → preference capture (DESIGN §8)
      - message.channels # channel thread messages → ingest as Threads (DESIGN §8)
      - message.groups # private-channel thread messages
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
