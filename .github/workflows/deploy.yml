name: Deploy

# Deploys the Worker to Cloudflare on every push to main (and on demand).
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  - token with Workers Scripts:Edit, D1:Edit, Workers KV:Edit, Queues:Edit
#   CLOUDFLARE_ACCOUNT_ID - the account id (c376f21a…)
# Worker runtime secrets (GitHub App key, Slack, …) are managed separately via
# the "Sync secrets" workflow or `wrangler secret put`.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Schema first, so the new Worker never runs against an old D1 schema.
      - name: Apply D1 migrations (remote)
        run: pnpm --filter @aipm/worker exec wrangler d1 migrations apply aipm --remote

      - name: Deploy Worker
        run: pnpm --filter @aipm/worker exec wrangler deploy
