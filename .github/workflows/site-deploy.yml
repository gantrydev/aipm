name: Deploy site

# Deploys @aipm/site to the Cloudflare Pages project "aipm-site". Manual trigger
# only — run from the Actions tab ("Run workflow") or `gh workflow run "Deploy site"`.
# The site is served at aipm.dev.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  - MUST include "Cloudflare Pages:Edit". The existing
#                           Workers-scoped token is NOT enough for Pages; the
#                           account owner must broaden it or add a Pages token.
#   CLOUDFLARE_ACCOUNT_ID - the account id (c376f21a…)
#
# The Pages project (production branch: main) already exists; this only uploads
# new deployments. wrangler is invoked from the repo root via the worker's
# installed binary so the "site/out" path resolves correctly — do NOT use
# `pnpm --filter @aipm/worker exec`, which runs in apps/worker and breaks the path.

on:
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @aipm/site run build

      - name: Deploy to Cloudflare Pages
        run: ./apps/worker/node_modules/.bin/wrangler pages deploy site/out --project-name=aipm-site --branch=main
