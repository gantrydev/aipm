name: Sync secrets

# Pushes the Worker's runtime secrets from GitHub repo secrets to Cloudflare.
# Run manually after setting/rotating any of them. GitHub forbids GITHUB_*-named
# secrets, so the GitHub App ones use a GH_ prefix and are remapped here.
#
# Required repo secrets (set the ones you have; missing ones are skipped):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   GH_APP_PRIVATE_KEY   -> GITHUB_APP_PRIVATE_KEY   (PKCS#8 PEM)
#   GH_APP_CLIENT_ID     -> GITHUB_APP_CLIENT_ID
#   GH_WEBHOOK_SECRET    -> GITHUB_WEBHOOK_SECRET
#   SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, IDENTITY_ROSTER (passed through)

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Upload secrets to Cloudflare
        env:
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_CLIENT_ID: ${{ secrets.GH_APP_CLIENT_ID }}
          GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          IDENTITY_ROSTER: ${{ secrets.IDENTITY_ROSTER }}
        working-directory: apps/worker
        run: |
          node ../../.github/scripts/build-secrets.mjs secrets.json
          pnpm exec wrangler secret bulk secrets.json
          rm -f secrets.json
