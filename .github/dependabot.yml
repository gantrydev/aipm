version: 2
updates:
  # GitHub Actions — bumps the SHA-pinned `uses:` refs (pinact-style pins carry a
  # version comment Dependabot reads).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # pnpm workspace — the root pnpm-lock.yaml covers every package in the monorepo.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      prod-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
